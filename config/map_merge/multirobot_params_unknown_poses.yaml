# Map merge params for Blinky + Pinky with UNKNOWN initial poses
# Pose estimation uses feature matching; works best if robots start close (< 3 m).
# Expects /blinky/map and /pinky/map from SLAM instances.
#
# map_merge now publishes TF (world_frame -> <robot>/map) automatically when
# publish_tf is true (default). This completes the TF tree for Nav2/Explorer:
#   map -> blinky/map -> blinky/odom -> blinky/base_footprint
# No tf_map_odom_fallback needed.

map_merge:
  ros__parameters:
    merging_rate: 4.0
    discovery_rate: 0.05
    estimation_rate: 0.5
    estimation_confidence: 0.6
    robot_map_topic: map
    robot_map_updates_topic: map_updates
    robot_namespace: ""
    merged_map_topic: map
    world_frame: map
    known_init_poses: false
    origin_margin: 0.05
    # Publish TF: world_frame -> <robot>/map (converts estimated pixel transforms to metric TF)
    publish_tf: true
