# Map merge params for Blinky + Pinky with UNKNOWN initial poses
# Expects /blinky/map and /pinky/map from SLAM instances.
#
# How it works:
#   - Pose estimation uses AKAZE feature matching to detect map overlap.
#   - When maps overlap, they are merged at the correct relative position.
#   - When maps do NOT overlap, they are placed side-by-side in the global
#     map so all robots remain visible and navigable.
#   - As robots explore and their maps start to overlap, the merge
#     transitions automatically from independent to feature-matched.
#
# TF: map_merge publishes world_frame -> <robot>/map for every robot.
# Full chain: map -> blinky/map -> blinky/odom -> blinky/base_footprint
# No tf_map_odom_fallback needed.

map_merge:
  ros__parameters:
    merging_rate: 4.0
    discovery_rate: 0.05
    estimation_rate: 0.5
    estimation_confidence: 0.6
    robot_map_topic: map
    robot_map_updates_topic: map_updates
    robot_namespace: ""
    merged_map_topic: map
    world_frame: map
    known_init_poses: false
    origin_margin: 0.05
    # Publish TF: world_frame -> <robot>/map (converts estimated pixel transforms to metric TF)
    publish_tf: true
