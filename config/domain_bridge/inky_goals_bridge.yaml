# Domain bridge: Central (domain 50) → Inky (ROS_DOMAIN_ID 32)
#
# Bridges exploration waypoints FROM the central computer TO the robot.
# The multi_robot_explorer publishes goals on /inky/goal_pose (domain 50).
# This bridge delivers them as /goal_pose on the robot's domain, where
# Nav2's BT navigator picks them up.
#
# Run with: ros2 run domain_bridge domain_bridge <path-to-this-file>

name: inky_goals_bridge
from_domain: 50
to_domain: 32
topics:
  inky/goal_pose:
    type: geometry_msgs/msg/PoseStamped
    remap: goal_pose
