# Domain bridge: Central (domain 50) → Blinky (ROS_DOMAIN_ID 30)
#
# Bridges Nav2 action goals FROM the central computer TO the robot.
# The multi_robot_explorer sends goals to /blinky/navigate_to_pose (domain 50).
# This bridge remaps them to /navigate_to_pose on the robot's domain.
#
# Run with: ros2 run domain_bridge domain_bridge <path-to-this-file>

name: blinky_goals_bridge
from_domain: 50
to_domain: 30
topics:
  # Fallback PoseStamped goal (central -> robot)
  /blinky/goal_pose:
    type: geometry_msgs/msg/PoseStamped
    remap: /goal_pose
services:
  # Action service endpoints (central -> robot)
  /blinky/navigate_to_pose/_action/send_goal:
    type: nav2_msgs/action/NavigateToPose_SendGoal
    remap: /navigate_to_pose/_action/send_goal
  /blinky/navigate_to_pose/_action/get_result:
    type: nav2_msgs/action/NavigateToPose_GetResult
    remap: /navigate_to_pose/_action/get_result
  /blinky/navigate_to_pose/_action/cancel_goal:
    type: action_msgs/srv/CancelGoal
    remap: /navigate_to_pose/_action/cancel_goal
